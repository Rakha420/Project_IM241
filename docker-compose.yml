services:
  web-server:
    image: php:8.1-apache
    container_name: smart_meeting_web
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
    networks:
      - smart-net
    command: >
      sh -c "docker-php-ext-install mysqli && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: smart_meeting_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=secret_password
      - MYSQL_DATABASE=db_office_smart
    ports:
      - "3310:3306"
    networks:
      - smart-net

networks:
  smart-net:
    driver: bridge